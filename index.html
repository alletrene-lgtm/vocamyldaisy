<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lecteur Daisy – AVH 35</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Lecteur Daisy"/>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223a;
      --accent: #7eb8f7;
      --accent2: #f7c97e;
      --text: #f0f0f0;
      --text-dim: #9090b0;
      --danger: #f77e7e;
      --success: #7ef7a0;
      --radius: 12px;
      --font-body: 'Atkinson Hyperlegible', 'Verdana', sans-serif;
      --font-size-base: 1.15rem;
    }
    @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); font-size: var(--font-size-base);
      min-height: 100vh; display: flex; flex-direction: column;
    }
    .skip-link {
      position: absolute; top: -999px; left: 0;
      background: var(--accent); color: var(--bg);
      padding: 8px 16px; font-weight: 700; z-index: 9999;
      border-radius: 0 0 var(--radius) 0;
    }
    .skip-link:focus { top: 0; }
    header {
      background: var(--surface); padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 2px solid var(--accent);
    }
    header h1 { font-size: 1.3rem; font-weight: 700; color: var(--accent); flex: 1; }
    #mic-indicator {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--text-dim); transition: background 0.3s, box-shadow 0.3s; flex-shrink: 0;
    }
    #mic-indicator.active {
      background: var(--danger); box-shadow: 0 0 10px var(--danger);
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    #status-bar {
      background: var(--surface2); padding: 10px 20px;
      font-size: 0.95rem; color: var(--accent2); min-height: 44px;
      display: flex; align-items: center; border-bottom: 1px solid #333355;
    }
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── ÉCRAN ACCUEIL ── */
    #screen-home {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      gap: 20px; padding: 24px 20px; overflow-y: auto; text-align: center;
    }
    #screen-home .hero-icon { font-size: 4rem; line-height: 1; filter: drop-shadow(0 0 20px var(--accent)); }
    #screen-home h2 { font-size: 1.4rem; color: var(--accent); max-width: 340px; line-height: 1.4; }
    #screen-home p { color: var(--text-dim); max-width: 320px; line-height: 1.6; font-size: 0.95rem; }
    .btn-primary {
      background: var(--accent); color: var(--bg); border: none; border-radius: var(--radius);
      padding: 18px 32px; font-family: var(--font-body); font-size: 1.1rem; font-weight: 700;
      cursor: pointer; min-width: 200px; transition: opacity 0.2s, transform 0.1s; touch-action: manipulation;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:focus-visible { outline: 3px solid var(--accent2); outline-offset: 4px; }
    .btn-secondary {
      background: transparent; color: var(--accent); border: 2px solid var(--accent);
      border-radius: var(--radius); padding: 14px 24px; font-family: var(--font-body);
      font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; touch-action: manipulation;
    }
    .btn-secondary:hover { background: #ffffff11; }
    .btn-secondary:focus-visible { outline: 3px solid var(--accent2); outline-offset: 4px; }
    #file-input { display: none; }
    #drop-zone {
      border: 2px dashed var(--text-dim); border-radius: var(--radius);
      padding: 20px; width: 100%; max-width: 340px;
      color: var(--text-dim); font-size: 0.9rem; transition: border-color 0.2s, color 0.2s; cursor: pointer;
    }
    #drop-zone.dragover { border-color: var(--accent); color: var(--accent); }

    /* ── BIBLIOTHÈQUE ── */
    #library-section { width: 100%; max-width: 400px; }
    #library-section h3 { color: var(--accent2); font-size: 1rem; margin-bottom: 10px; text-align: left; }
    #library-list { list-style: none; width: 100%; }
    #library-list li {
      background: var(--surface2); border-radius: var(--radius);
      margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
      border: 1px solid #333355; overflow: hidden;
    }
    #library-list li .lib-btn {
      flex: 1; background: none; border: none; color: var(--text);
      text-align: left; padding: 14px 12px; font-family: var(--font-body);
      font-size: 0.95rem; cursor: pointer; touch-action: manipulation;
    }
    #library-list li .lib-btn:hover { background: #2a2a4a; }
    #library-list li .lib-btn:focus-visible { outline: 3px solid var(--accent2); outline-offset: -2px; }
    #library-list li .lib-del {
      background: none; border: none; color: var(--danger);
      padding: 14px 12px; cursor: pointer; font-size: 1.1rem; touch-action: manipulation;
    }
    #library-list li .lib-del:hover { background: #3a1a1a; }
    .lib-meta { font-size: 0.75rem; color: var(--text-dim); display: block; margin-top: 2px; }
    #library-empty { color: var(--text-dim); font-size: 0.9rem; text-align: center; padding: 12px; }

    /* ── ÉCRAN LECTURE ── */
    #screen-reader { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    #screen-reader.active { display: flex; }
    #book-info { background: var(--surface2); padding: 12px 20px; border-bottom: 1px solid #333355; }
    #book-title { font-size: 1rem; font-weight: 700; color: var(--accent); }
    #book-author { font-size: 0.85rem; color: var(--text-dim); }
    #audio-section { padding: 16px 20px; background: var(--surface); border-bottom: 1px solid #333355; }
    #audio-player { width: 100%; margin-bottom: 12px; }
    #current-chapter { font-size: 0.95rem; color: var(--accent2); min-height: 24px; margin-bottom: 8px; }
    .speed-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .speed-row label { color: var(--text-dim); font-size: 0.9rem; }
    #speed-select {
      background: var(--surface2); color: var(--text); border: 1px solid var(--text-dim);
      border-radius: 6px; padding: 4px 8px; font-family: var(--font-body); font-size: 0.9rem;
    }
    #nav-controls {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 20px;
      border-bottom: 1px solid #333355;
    }
    #nav-controls button {
      background: var(--surface2); color: var(--text); border: 1px solid #444466;
      border-radius:
