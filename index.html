<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DaisyPlayer Accessible - Bibliothèque</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body {
      background-color: #121212;
      color: #FFFFFF;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      font-size: 1.3rem;
    }
    button, label.button-label {
      display: block;
      text-align: center;
      background-color: #FFCC00;
      color: #000000;
      border: none;
      padding: 15px 25px;
      font-size: 1.4rem;
      font-weight: bold;
      margin: 10px 0;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      box-sizing: border-box;
    }
    button:focus, label.button-label:focus-within {
      outline: 4px solid #00E6FF;
    }
    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
    .status-area {
      background-color: #1E1E1E;
      padding: 15px;
      border-left: 5px solid #FFCC00;
      margin-bottom: 20px;
    }
    .player-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }
    audio {
      width: 100%;
      margin-top: 15px;
    }
    ul {
      list-style-type: none;
      padding: 0;
    }
    li {
      margin: 15px 0;
      padding: 10px;
      background-color: #1E1E1E;
      border-radius: 8px;
    }
    .book-item {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chapter-btn {
      background-color: #2A2A2A;
      color: #FFFFFF;
      border: 2px solid #FFFFFF;
      text-align: left;
    }
    .chapter-btn:focus {
      background-color: #FFCC00;
      color: #000000;
    }
    .chapter-btn.chapitre-actif {
      border-color: #FFCC00;
      border-width: 3px;
    }
    .delete-btn {
      background-color: #FF3333;
      color: #FFFFFF;
    }
    .fav-btn {
      background-color: #2A2A2A;
      color: #FFCC00;
      border: 2px solid #FFCC00;
      text-align: left;
    }
    .tabs-row {
      display: flex;
      gap: 8px;
      margin-top: 30px;
    }
    .tabs-row button {
      background-color: #2A2A2A;
      color: #FFFFFF;
      border: 2px solid #555555;
    }
    .tabs-row button.tab-active {
      background-color: #FFCC00;
      color: #000000;
      border-color: #FFCC00;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

  <header>
    <h1>DaisyPlayer</h1>
  </header>

  <main>
    <!-- Zone de statut : UNIQUEMENT mise à jour via aria-live, jamais de .focus()
         forcé par script. C'est TalkBack qui décide seul d'annoncer ou non ce
         changement, sans qu'on lui impose de déplacement de curseur. -->
    <div class="status-area" role="status" aria-live="polite" id="status">
      Connexion à la bibliothèque en cours...
    </div>

    <section aria-label="Importer un nouveau livre">
      <label class="button-label">
        Ajouter un livre à la bibliothèque (ZIP)
        <input type="file" id="fileInput" accept=".zip" onchange="ajouterLivreALaBibliotheque(event)">
      </label>
    </section>

    <section aria-label="Lecteur audio" style="margin-top: 20px;">
      <h2 id="titreChapitreEnCours">Aucun chapitre en cours</h2>
      <!-- Lecteur audio natif visible : TalkBack peut s'en servir directement
           (barre de progression, bouton lecture/pause natif) en complément
           des boutons ci-dessous. -->
      <audio id="audioPlayer" controls></audio>
      <div class="player-controls">
        <button onclick="piloterAudio('play')">Lire</button>
        <button onclick="piloterAudio('pause')">Pause</button>
        <button onclick="piloterAudio('reculer')">Reculer 15s</button>
        <button onclick="piloterAudio('avancer')">Avancer 15s</button>
      </div>
      <button onclick="ajouterFavori()" style="margin-top:15px; background-color:#FFCC00;">
        ⭐ Ajouter ce passage aux favoris
      </button>
    </section>

    <section aria-label="Ma Bibliothèque" style="margin-top: 30px;">
      <h2>Ma Bibliothèque</h2>
      <ul id="listeLivres">
        </ul>
    </section>

    <section aria-label="Livre en cours" style="margin-top: 30px;">
      <h2 id="titreLivreEnCours">Aucun livre sélectionné</h2>

      <!-- Onglets Table des matières / Favoris : navigation 100% tactile,
           aucun changement d'onglet n'est lu automatiquement. -->
      <div class="tabs-row" role="tablist" aria-label="Table des matières et favoris">
        <button id="ongletTable" role="tab" aria-selected="true" class="tab-active" onclick="changerOnglet('table')">Table des matières</button>
        <button id="ongletFavoris" role="tab" aria-selected="false" onclick="changerOnglet('favoris')">Favoris</button>
      </div>

      <div id="panneauTable" class="tab-panel active">
        <ul id="tableMatieres"></ul>
      </div>

      <div id="panneauFavoris" class="tab-panel">
        <ul id="listeFavoris"></ul>
        <p id="favorisVide" style="display:none; color:#AAAAAA;">Aucun favori pour ce livre. Touchez « Ajouter ce passage aux favoris » pendant la lecture.</p>
      </div>
    </section>
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch((err) => console.error(err));
    }

    const statusZone = document.getElementById("status");
    const listeLivres = document.getElementById("listeLivres");
    const listeChapitres = document.getElementById("tableMatieres");
    const titreLivreEnCours = document.getElementById("titreLivreEnCours");
    const titreChapitreEnCours = document.getElementById("titreChapitreEnCours");
    const audioPlayer = document.getElementById("audioPlayer");
    const listeFavorisEl = document.getElementById("listeFavoris");
    const favorisVideEl = document.getElementById("favorisVide");

    let db = null;
    let zipInstance = null;
    let nomLivreActuel = null;
    let indexChapitreActuel = -1;
    let titreChapitreActuelTexte = "";

    // Playlist du chapitre en cours : liste ordonnée de { fichier, clipBegin, clipEnd }
    let playlistChapitre = [];
    let indexClipActuel = 0;

    const request = indexedDB.open("DaisyLibraryDB", 2);

    request.onupgradeneeded = (event) => {
      db = event.target.result;
      if (!db.objectStoreNames.contains("books")) {
        db.createObjectStore("books", { keyPath: "name" });
      }
      if (!db.objectStoreNames.contains("favoris")) {
        const favStore = db.createObjectStore("favoris", { keyPath: "favId" });
        favStore.createIndex("nomLivre", "nomLivre", { unique: false });
      }
    };

    request.onsuccess = (event) => {
      db = event.target.result;
      statusZone.textContent = "Bibliothèque chargée. Prête.";
      rafraichirBibliotheque();
    };

    request.onerror = () => {
      statusZone.textContent = "Erreur lors de l'accès à la bibliothèque locale.";
    };

    // ────────────────────────────────────────────────
    // BIBLIOTHÈQUE
    // ────────────────────────────────────────────────
    async function rafraichirBibliotheque() {
      listeLivres.innerHTML = "";
      const transaction = db.transaction("books", "readonly");
      const store = transaction.objectStore("books");
      const requestAll = store.getAll();

      requestAll.onsuccess = () => {
        const livres = requestAll.result;
        if (livres.length === 0) {
          listeLivres.innerHTML = "<li>Aucun livre dans votre bibliothèque.</li>";
          return;
        }

        livres.forEach((livre) => {
          const li = document.createElement("li");
          li.className = "book-item";

          const titleSpan = document.createElement("span");
          titleSpan.textContent = livre.name;
          titleSpan.style.fontWeight = "bold";

          const openBtn = document.createElement("button");
          openBtn.textContent = `Ouvrir ${livre.name}`;
          openBtn.onclick = () => chargerLivre(livre.blob, livre.name);

          const deleteBtn = document.createElement("button");
          deleteBtn.className = "delete-btn";
          deleteBtn.textContent = `Supprimer ${livre.name}`;
          deleteBtn.onclick = () => supprimerLivre(livre.name);

          li.appendChild(titleSpan);
          li.appendChild(openBtn);
          li.appendChild(deleteBtn);
          listeLivres.appendChild(li);
        });
      };
    }

    async function ajouterLivreALaBibliotheque(event) {
      const file = event.target.files[0];
      if (!file) return;

      statusZone.textContent = `Ajout de ${file.name} à la bibliothèque...`;

      const transaction = db.transaction("books", "readwrite");
      const store = transaction.objectStore("books");

      const nouveauLivre = {
        name: file.name.replace(".zip", ""),
        blob: file
      };

      const addRequest = store.put(nouveauLivre);

      addRequest.onsuccess = () => {
        statusZone.textContent = `${nouveauLivre.name} a été ajouté avec succès à votre bibliothèque.`;
        rafraichirBibliotheque();
      };

      addRequest.onerror = () => {
        statusZone.textContent = "Impossible de sauvegarder le livre.";
      };
    }

    function supprimerLivre(nom) {
      if (confirm(`Voulez-vous vraiment supprimer le livre ${nom} ?`)) {
        const transaction = db.transaction("books", "readwrite");
        const store = transaction.objectStore("books");
        store.delete(nom);

        transaction.oncomplete = () => {
          statusZone.textContent = `Le livre ${nom} a été supprimé.`;
          if (titreLivreEnCours.textContent === nom) {
            listeChapitres.innerHTML = "";
            titreLivreEnCours.textContent = "Aucun livre sélectionné";
            titreChapitreEnCours.textContent = "Aucun chapitre en cours";
            audioPlayer.removeAttribute("src");
            nomLivreActuel = null;
          }
          rafraichirBibliotheque();
        };
      }
    }

    // ────────────────────────────────────────────────
    // CHARGEMENT D'UN LIVRE ET TABLE DES MATIÈRES
    // (aucune lecture automatique : on construit juste la liste de boutons)
    // ────────────────────────────────────────────────
    async function chargerLivre(blob, nomLivre) {
      statusZone.textContent = `Ouverture de ${nomLivre}...`;
      listeChapitres.innerHTML = "";
      titreLivreEnCours.textContent = nomLivre;
      nomLivreActuel = nomLivre;
      indexChapitreActuel = -1;

      try {
        zipInstance = await JSZip.loadAsync(blob);

        let nccFileName = Object.keys(zipInstance.files).find(name =>
          name.toLowerCase().endsWith("ncc.html") || name.toLowerCase().endsWith(".opf")
        );

        if (!nccFileName) {
          statusZone.textContent = "Fichier de navigation DAISY introuvable.";
          return;
        }

        const nccContent = await zipInstance.files[nccFileName].async("string");
        const parser = new DOMParser();
        const doc = parser.parseFromString(nccContent, "text/html");
        const headings = doc.querySelectorAll("h1, h2, h3, h4, h5, h6");

        headings.forEach((heading, index) => {
          const lien = heading.querySelector("a");
          if (!lien) return;

          const titreTexte = lien.textContent.trim();
          const hrefCible = lien.getAttribute("href");

          const li = document.createElement("li");
          const btn = document.createElement("button");
          btn.className = "chapter-btn";
          btn.textContent = `${index + 1}. ${titreTexte}`;
          // Navigation 100% tactile : un clic charge ET lance le chapitre.
          // Aucune lecture vocale de la table n'est déclenchée automatiquement.
          btn.onclick = () => {
            document.querySelectorAll(".chapter-btn").forEach(b => b.classList.remove("chapitre-actif"));
            btn.classList.add("chapitre-actif");
            chargerEtLireChapitre(hrefCible, titreTexte, index);
          };

          li.appendChild(btn);
          listeChapitres.appendChild(li);
        });

        statusZone.textContent = `Livre ${nomLivre} prêt. ${headings.length} chapitres trouvés. Touchez un chapitre pour l'écouter.`;
        await rafraichirFavoris();

      } catch (err) {
        console.error(err);
        statusZone.textContent = "Erreur lors du chargement des chapitres.";
      }
    }

    // ────────────────────────────────────────────────
    // LECTURE D'UN CHAPITRE — PLAYLIST DE CLIPS SMIL
    // ────────────────────────────────────────────────
    async function chargerEtLireChapitre(hrefCible, titreTexte, index) {
      if (!zipInstance) return;

      statusZone.textContent = `Analyse du chapitre : ${titreTexte}...`;
      indexChapitreActuel = index;
      titreChapitreActuelTexte = titreTexte;
      titreChapitreEnCours.textContent = titreTexte;

      let nomFichierCible = hrefCible.split("#")[0];

      try {
        playlistChapitre = [];
        indexClipActuel = 0;

        if (nomFichierCible.toLowerCase().endsWith('.smil')) {
          const smilFileKey = Object.keys(zipInstance.files).find(name =>
            name.toLowerCase().endsWith(nomFichierCible.toLowerCase())
          );

          if (!smilFileKey) {
            statusZone.textContent = `Fichier SMIL introuvable pour ${titreTexte}.`;
            return;
          }

          const smilContent = await zipInstance.files[smilFileKey].async("string");
          const parser = new DOMParser();
          const smilDoc = parser.parseFromString(smilContent, "text/xml");

          // Un chapitre Daisy peut contenir PLUSIEURS petits clips audio
          // (un par paragraphe/phrase). querySelectorAll récupère TOUS les
          // clips, dans l'ordre du document, pour construire la playlist
          // complète du chapitre — c'est ce qui permet la lecture jusqu'au bout.
          const toutesLesBalisesAudio = smilDoc.querySelectorAll("audio");

          if (toutesLesBalisesAudio.length === 0) {
            statusZone.textContent = `Aucun fichier audio trouvé dans la structure SMIL pour ${titreTexte}.`;
            return;
          }

          toutesLesBalisesAudio.forEach(audioTag => {
            playlistChapitre.push({
              fichier: audioTag.getAttribute("src"),
              clipBegin: parserTempsNpt(audioTag.getAttribute("clip-begin") || audioTag.getAttribute("clipBegin")),
              clipEnd: parserTempsNpt(audioTag.getAttribute("clip-end") || audioTag.getAttribute("clipEnd")),
            });
          });

        } else {
          playlistChapitre.push({ fichier: nomFichierCible, clipBegin: 0, clipEnd: null });
        }

        statusZone.textContent = `Lecture en cours : ${titreTexte}`;
        await lireClip(0);

      } catch (err) {
        console.error(err);
        statusZone.textContent = "Erreur lors du lancement de la lecture audio.";
      }
    }

    function parserTempsNpt(valeur) {
      if (!valeur) return null;
      const nettoye = valeur.replace(/^npt=/, "").replace(/s$/, "");
      const nombre = parseFloat(nettoye);
      return isNaN(nombre) ? null : nombre;
    }

    async function lireClip(index) {
      if (index < 0 || index >= playlistChapitre.length) return;
      indexClipActuel = index;
      const clip = playlistChapitre[index];

      const mp3FileName = clip.fichier.split("#")[0];
      const fichierZipAudio = Object.keys(zipInstance.files).find(name =>
        name.toLowerCase().endsWith(mp3FileName.toLowerCase())
      );

      if (!fichierZipAudio) {
        statusZone.textContent = `Fichier audio introuvable : ${mp3FileName}.`;
        return;
      }

      if (audioPlayer.dataset.fichierCharge !== fichierZipAudio) {
        const audioBlob = await zipInstance.files[fichierZipAudio].async("blob");
        const audioUrl = URL.createObjectURL(audioBlob);
        audioPlayer.src = audioUrl;
        audioPlayer.dataset.fichierCharge = fichierZipAudio;
        await new Promise(resolve => {
          if (audioPlayer.readyState >= 1) resolve();
          else audioPlayer.addEventListener("loadedmetadata", resolve, { once: true });
        });
      }

      audioPlayer.currentTime = clip.clipBegin || 0;
      await audioPlayer.play();
    }

    audioPlayer.addEventListener("timeupdate", () => {
      const clip = playlistChapitre[indexClipActuel];
      if (clip && clip.clipEnd != null && audioPlayer.currentTime >= clip.clipEnd) {
        passerAuClipSuivant();
      }
    });
    audioPlayer.addEventListener("ended", () => {
      passerAuClipSuivant();
    });

    function passerAuClipSuivant() {
      if (indexClipActuel + 1 < playlistChapitre.length) {
        lireClip(indexClipActuel + 1);
      } else {
        statusZone.textContent = "Fin du chapitre.";
      }
    }

    // ────────────────────────────────────────────────
    // COMMANDES DE LECTURE (boutons tactiles uniquement,
    // aucun focus forcé par script)
    // ────────────────────────────────────────────────
    function piloterAudio(action) {
      if (!audioPlayer.src) {
        statusZone.textContent = "Aucun chapitre en cours de lecture.";
        return;
      }

      if (action === "play") {
        audioPlayer.play();
        statusZone.textContent = "Lecture reprise.";
      } else if (action === "pause") {
        audioPlayer.pause();
        statusZone.textContent = "Lecture en pause.";
      } else if (action === "reculer") {
        deplacerDansPlaylist(-15);
        statusZone.textContent = "Recul de 15 secondes.";
      } else if (action === "avancer") {
        deplacerDansPlaylist(15);
        statusZone.textContent = "Avance de 15 secondes.";
      }
    }

    async function deplacerDansPlaylist(delta) {
      const clipCourant = playlistChapitre[indexClipActuel];
      if (!clipCourant) return;
      const debutClip = clipCourant.clipBegin || 0;
      const finClip = clipCourant.clipEnd != null ? clipCourant.clipEnd : audioPlayer.duration;

      let tempsRestant = delta;
      let index = indexClipActuel;
      let positionDansClip = audioPlayer.currentTime;

      if (delta > 0) {
        let margeDisponible = finClip - positionDansClip;
        while (tempsRestant > margeDisponible && index < playlistChapitre.length - 1) {
          tempsRestant -= margeDisponible;
          index++;
          const nextClip = playlistChapitre[index];
          positionDansClip = nextClip.clipBegin || 0;
          margeDisponible = (nextClip.clipEnd != null ? nextClip.clipEnd : Infinity) - positionDansClip;
        }
        positionDansClip = positionDansClip + Math.min(tempsRestant, margeDisponible);
      } else {
        tempsRestant = -tempsRestant;
        let margeDisponible = positionDansClip - debutClip;
        while (tempsRestant > margeDisponible && index > 0) {
          tempsRestant -= margeDisponible;
          index--;
          const prevClip = playlistChapitre[index];
          const prevFin = prevClip.clipEnd != null ? prevClip.clipEnd : audioPlayer.duration;
          positionDansClip = prevFin;
          margeDisponible = prevFin - (prevClip.clipBegin || 0);
        }
        positionDansClip = Math.max(playlistChapitre[index].clipBegin || 0, positionDansClip - tempsRestant);
      }

      if (index !== indexClipActuel) {
        await lireClip(index);
      }
      audioPlayer.currentTime = Math.max(0, positionDansClip);
    }

    // ────────────────────────────────────────────────
    // ONGLETS TABLE DES MATIÈRES / FAVORIS
    // ────────────────────────────────────────────────
    function changerOnglet(onglet) {
      const panneauTable = document.getElementById("panneauTable");
      const panneauFavoris = document.getElementById("panneauFavoris");
      const ongletTable = document.getElementById("ongletTable");
      const ongletFavoris = document.getElementById("ongletFavoris");

      if (onglet === "table") {
        panneauTable.classList.add("active");
        panneauFavoris.classList.remove("active");
        ongletTable.classList.add("tab-active");
        ongletFavoris.classList.remove("tab-active");
        ongletTable.setAttribute("aria-selected", "true");
        ongletFavoris.setAttribute("aria-selected", "false");
      } else {
        panneauFavoris.classList.add("active");
        panneauTable.classList.remove("active");
        ongletFavoris.classList.add("tab-active");
        ongletTable.classList.remove("tab-active");
        ongletFavoris.setAttribute("aria-selected", "true");
        ongletTable.setAttribute("aria-selected", "false");
      }
    }

    // ────────────────────────────────────────────────
    // FAVORIS (position = livre + chapitre + minutage)
    // ────────────────────────────────────────────────
    function ajouterFavori() {
      if (!nomLivreActuel || indexChapitreActuel < 0) {
        statusZone.textContent = "Aucun chapitre en cours : impossible d'ajouter un favori.";
        return;
      }
      const fav = {
        favId: "fav_" + Date.now(),
        nomLivre: nomLivreActuel,
        indexChapitre: indexChapitreActuel,
        titreChapitre: titreChapitreActuelTexte,
        tempsDansChapitre: audioPlayer.currentTime || 0,
      };
      const transaction = db.transaction("favoris", "readwrite");
      transaction.objectStore("favoris").put(fav);
      transaction.oncomplete = () => {
        statusZone.textContent = `Favori ajouté : ${fav.titreChapitre} à ${formaterTemps(fav.tempsDansChapitre)}.`;
        rafraichirFavoris();
      };
    }

    function formaterTemps(secondes) {
      if (!secondes || isNaN(secondes)) return "0:00";
      const m = Math.floor(secondes / 60);
      const s = Math.floor(secondes % 60);
      return m + ":" + String(s).padStart(2, "0");
    }

    async function rafraichirFavoris() {
      listeFavorisEl.innerHTML = "";
      if (!nomLivreActuel) { favorisVideEl.style.display = ""; return; }

      const transaction = db.transaction("favoris", "readonly");
      const index = transaction.objectStore("favoris").index("nomLivre");
      const requestAll = index.getAll(nomLivreActuel);

      requestAll.onsuccess = () => {
        const favoris = requestAll.result;
        if (favoris.length === 0) {
          favorisVideEl.style.display = "";
          return;
        }
        favorisVideEl.style.display = "none";
        favoris.sort((a, b) => a.indexChapitre - b.indexChapitre || a.tempsDansChapitre - b.tempsDansChapitre);

        favoris.forEach((fav) => {
          const li = document.createElement("li");

          const btn = document.createElement("button");
          btn.className = "fav-btn";
          btn.textContent = `${fav.titreChapitre} — à ${formaterTemps(fav.tempsDansChapitre)}`;
          btn.onclick = () => allerAuFavori(fav);

          const delBtn = document.createElement("button");
          delBtn.className = "delete-btn";
          delBtn.textContent = "Supprimer ce favori";
          delBtn.onclick = () => supprimerFavori(fav.favId);

          li.appendChild(btn);
          li.appendChild(delBtn);
          listeFavorisEl.appendChild(li);
        });
      };
    }

    function supprimerFavori(favId) {
      const transaction = db.transaction("favoris", "readwrite");
      transaction.objectStore("favoris").delete(favId);
      transaction.oncomplete = () => {
        statusZone.textContent = "Favori supprimé.";
        rafraichirFavoris();
      };
    }

    async function allerAuFavori(fav) {
      // Retrouver le lien du chapitre correspondant dans la table des matières actuelle
      const boutons = document.querySelectorAll(".chapter-btn");
      const btnCible = boutons[fav.indexChapitre];
      if (!btnCible) {
        statusZone.textContent = "Chapitre introuvable pour ce favori.";
        return;
      }
      btnCible.click();
      // Attendre que le chapitre soit chargé, puis se positionner au bon moment
      const attenteChargement = setInterval(() => {
        if (playlistChapitre.length > 0 && audioPlayer.readyState >= 1) {
          clearInterval(attenteChargement);
          audioPlayer.currentTime = fav.tempsDansChapitre;
          changerOnglet("table");
          statusZone.textContent = `Favori : ${fav.titreChapitre} à ${formaterTemps(fav.tempsDansChapitre)}.`;
        }
      }, 150);
    }
  </script>
</body>
</html>
